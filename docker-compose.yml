services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: my-app-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules