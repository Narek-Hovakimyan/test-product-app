services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-app-prod
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-backend-prod
    ports:
      - "5000:5000"